name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm install
      - run: npm --prefix frontend install
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run build

  backend:
    name: Backend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m venv backend/.venv
      - run: backend/.venv/bin/python -m pip install --upgrade pip
      - run: backend/.venv/bin/python -m pip install -r backend/requirements.txt
      - name: Print backend environment
        run: |
          backend/.venv/bin/python --version
          backend/.venv/bin/python -c "import platform, sys; print(platform.platform()); print(sys.executable)"
          backend/.venv/bin/python -m pip freeze
      - run: cd backend && .venv/bin/python -m pytest tests -q -ra
